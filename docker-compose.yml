services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sushi
      POSTGRES_USER: sushi
      POSTGRES_PASSWORD: sushi
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py seed_data --with-demo-users &&
        python manage.py runserver 0.0.0.0:8000
      "
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: "dev-secret-change-in-production"
      DB_HOST: db
      DB_NAME: sushi
      DB_USER: sushi
      DB_PASSWORD: sushi
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
