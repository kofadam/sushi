apiVersion: v1
kind: Namespace
metadata:
  name: sushi
---
apiVersion: v1
kind: Secret
metadata:
  name: sushi-secrets
  namespace: sushi
type: Opaque
stringData:
  # CHANGE ALL OF THESE IN PRODUCTION
  DJANGO_SECRET_KEY: "CHANGE-ME-generate-a-real-secret-key"
  DB_PASSWORD: "CHANGE-ME-strong-db-password"
  OIDC_RP_CLIENT_SECRET: "CHANGE-ME-your-oidc-client-secret"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sushi-config
  namespace: sushi
data:
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: "sushi.yourdomain.local"
  DB_HOST: "sushi-db"
  DB_NAME: "sushi"
  DB_USER: "sushi"
  DB_PORT: "5432"
  CORS_ALLOWED_ORIGINS: "https://sushi.yourdomain.local"
  LOGIN_REDIRECT_URL: "https://sushi.yourdomain.local/"
  LOGOUT_REDIRECT_URL: "https://sushi.yourdomain.local/"
  # OIDC — adjust for your Keycloak/Entra setup
  OIDC_RP_CLIENT_ID: "sushi"
  OIDC_OP_AUTHORIZATION_ENDPOINT: "https://keycloak.yourdomain.local/realms/your-realm/protocol/openid-connect/auth"
  OIDC_OP_TOKEN_ENDPOINT: "https://keycloak.yourdomain.local/realms/your-realm/protocol/openid-connect/token"
  OIDC_OP_USER_ENDPOINT: "https://keycloak.yourdomain.local/realms/your-realm/protocol/openid-connect/userinfo"
  OIDC_OP_JWKS_ENDPOINT: "https://keycloak.yourdomain.local/realms/your-realm/protocol/openid-connect/certs"
  OIDC_RP_SIGN_ALGO: "RS256"
  OIDC_GROUPS_CLAIM: "groups"
  OIDC_MANAGER_GROUP: "sushi-managers"
  OIDC_TEAM_LEAD_GROUP: "sushi-team-leads"
  OIDC_SENIOR_TECH_GROUP: "sushi-senior-techs"
---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sushi-db
  namespace: sushi
spec:
  serviceName: sushi-db
  replicas: 1
  selector:
    matchLabels:
      app: sushi-db
  template:
    metadata:
      labels:
        app: sushi-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: sushi-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: sushi-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sushi-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sushi-db
  namespace: sushi
spec:
  selector:
    app: sushi-db
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sushi-backend
  namespace: sushi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sushi-backend
  template:
    metadata:
      labels:
        app: sushi-backend
    spec:
      initContainers:
        - name: migrate
          image: harbor.yourdomain.local/sushi/backend:latest
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - configMapRef:
                name: sushi-config
            - secretRef:
                name: sushi-secrets
      containers:
        - name: backend
          image: harbor.yourdomain.local/sushi/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: sushi-config
            - secretRef:
                name: sushi-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/auth/status/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/auth/status/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: sushi-backend
  namespace: sushi
spec:
  selector:
    app: sushi-backend
  ports:
    - port: 8000
      targetPort: 8000
---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sushi-frontend
  namespace: sushi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sushi-frontend
  template:
    metadata:
      labels:
        app: sushi-frontend
    spec:
      containers:
        - name: frontend
          image: harbor.yourdomain.local/sushi/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sushi-frontend
  namespace: sushi
spec:
  selector:
    app: sushi-frontend
  ports:
    - port: 80
      targetPort: 80
---
# HTTPProxy (Contour) — adjust for your wildcard cert
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: sushi
  namespace: sushi
spec:
  virtualhost:
    fqdn: sushi.yourdomain.local
    tls:
      secretName: wildcard-tls
  routes:
    - conditions:
        - prefix: /api/
      services:
        - name: sushi-backend
          port: 8000
    - conditions:
        - prefix: /oidc/
      services:
        - name: sushi-backend
          port: 8000
    - conditions:
        - prefix: /admin/
      services:
        - name: sushi-backend
          port: 8000
    - conditions:
        - prefix: /static/
      services:
        - name: sushi-backend
          port: 8000
    - conditions:
        - prefix: /
      services:
        - name: sushi-frontend
          port: 80
